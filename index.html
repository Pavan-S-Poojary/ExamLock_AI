<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExamLock AI – Advanced Proctoring</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14"></script>
  <style>
    :root {
      --bg: #0a001f;
      --glass: rgba(25, 30, 80, 0.55);
      --glass-border: rgba(100, 220, 255, 0.42);
      --neon-cyan: #00faff;
      --neon-purple: #ff00e6;
      --glow: 0 0 18px #00faff, 0 0 36px #00faff55, 0 0 60px #ff00e633;
      --danger: #ff3366;
      --success: #00ffaa;
      --input-bg: rgba(255,255,255,0.08);
      --input-focus: rgba(0, 250, 255, 0.35);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: #e0f0ff;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 70px;
      background: rgba(10, 15, 50, 0.94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      z-index: 1000;
    }

    header h1 {
      font-size: 1.9rem;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: var(--glow);
    }

    .logout-btn {
      background: var(--danger);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .logout-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--danger); }

    .screen {
      display: none;
      min-height: 100vh;
      padding-top: 90px;
      padding-bottom: 90px;
    }

    .screen.active { display: block; animation: fadeIn 0.7s ease; }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      box-shadow: var(--glow);
      padding: 2.5rem;
      transition: all 0.35s ease;
    }

    .glass-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 0 70px var(--neon-cyan), inset 0 0 50px rgba(0,255,240,0.2);
    }

    input {
      width: 100%;
      padding: 16px;
      margin: 14px 0;
      background: var(--input-bg);
      border: 2px solid var(--glass-border);
      border-radius: 20px;
      color: white;
      font-size: 1.1rem;
      transition: all 0.3s;
    }

    input:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 25px var(--input-focus);
    }

    button.neon, button.danger, .remove-btn {
      padding: 14px 32px;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }

    button.neon {
      background: linear-gradient(135deg, #00eaff, #0099ff, #d400ff);
      background-size: 300%;
      color: white;
      box-shadow: var(--glow);
      animation: gradientFlow 10s ease infinite;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    button.neon:hover { transform: translateY(-4px) scale(1.04); box-shadow: 0 0 80px var(--neon-cyan); }

    button.danger { background: var(--danger); color: white; }

    .remove-btn {
      background: var(--danger);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.95rem;
      margin-top: 12px;
      width: 100%;
    }

    .remove-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--danger); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 2rem;
      padding: 1rem;
    }

    /* EXAM */
    #exam-screen { background: #000; }
    .top-bar {
      height: 64px;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(14px);
      position: fixed;
      top: 70px; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      z-index: 200;
      font-weight: 600;
    }

    .main-area {
      margin-top: 134px;
      height: calc(100vh - 134px);
      position: relative;
    }

    #form-iframe { width: 100%; height: 100%; border: none; background: white; }

    .side-panel {
      position: absolute;
      top: 90px;
      right: 20px;
      width: 380px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }

    .monitor {
      border: 4px solid var(--neon-cyan);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--glow);
    }

    .status-bar {
      padding: 16px;
      font-size: 1.05rem;
      border-radius: 20px;
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--glass-border);
      text-align: center;
    }

    .log {
      max-height: 360px;
      overflow-y: auto;
      background: rgba(0,0,0,0.7);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid var(--glass-border);
    }

    .log-item {
      padding: 10px 14px;
      margin: 8px 0;
      background: rgba(255,255,255,0.07);
      border-radius: 12px;
      font-size: 0.95rem;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10,15,50,0.94);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--glass-border);
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.95rem;
      z-index: 1000;
      line-height: 1.6;
    }

    footer strong { color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); }
  </style>
</head>
<body>

<header>
  <h1>ExamLock AI</h1>
  <div style="display:flex;gap:1.2rem;align-items:center;">
    <button class="neon" onclick="document.documentElement.requestFullscreen()" style="padding:10px 18px;border-radius:20px;">
      <i class="fas fa-expand"></i> Fullscreen
    </button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="glass-card" style="max-width:520px; margin:140px auto 40px;">
    <h1 style="text-align:center; margin-bottom:0.8rem;">ExamLock AI</h1>
    <p style="text-align:center; margin-bottom:2rem; color:#a5b4fc; font-size:1.15rem;">
      Secure AI Proctoring Platform
    </p>

    <div style="display:flex; gap:1rem; margin-bottom:2.2rem;">
      <button onclick="document.getElementById('student-login').style.display='block'; document.getElementById('admin-login').style.display='none';" style="flex:1; background:#4b5563; padding:14px;border-radius:20px;">Student</button>
      <button onclick="document.getElementById('admin-login').style.display='block'; document.getElementById('student-login').style.display='none';" style="flex:1; padding:14px;border-radius:20px;">Admin</button>
    </div>

    <div id="student-login">
      <input id="student-name" placeholder="Your Full Name" autocomplete="off" autofocus required>
      <button class="neon" onclick="startStudent()" style="width:100%; margin-top:1rem;border-radius:20px;">Begin as Student</button>
    </div>

    <div id="admin-login" style="display:none;">
      <input id="admin-user" value="admin" placeholder="Username">
      <input id="admin-pass" type="password" placeholder="Password">
      <button class="neon" onclick="loginAdmin()" style="width:100%; margin-top:1rem;border-radius:20px;">Admin Login</button>
    </div>
  </div>
</div>

<!-- STUDENT DASHBOARD -->
<div id="student-dashboard" class="screen">
  <div class="dashboard-content" style="padding:2rem;max-width:1400px;margin:0 auto;">
    <h2 style="text-align:center;margin-bottom:2rem;">Welcome, <span id="student-display-name" style="color:var(--neon-cyan);"></span></h2>
    <h3 style="text-align:center;margin-bottom:1.5rem;">Available Examinations</h3>
    <div id="test-grid" class="grid"></div>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin-dashboard" class="screen">
  <div class="dashboard-content" style="padding:2rem;max-width:1400px;margin:0 auto;">
    <h2 style="text-align:center;margin-bottom:1.5rem;">Manage Tests</h2>
    <div style="display:flex;gap:14px;margin-bottom:2.5rem;flex-wrap:wrap;justify-content:center;">
      <input id="new-name" placeholder="Test Name" style="flex:1;min-width:240px;padding:14px;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:20px;color:white;">
      <input id="new-url" placeholder="Google Form URL" style="flex:2;min-width:320px;padding:14px;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:20px;color:white;">
      <button class="neon" onclick="addTest()" style="border-radius:20px;">+ Add</button>
    </div>
    <div id="admin-tests" class="grid"></div>
  </div>
</div>

<!-- EXAM SCREEN -->
<div id="exam-screen" class="screen">
  <div class="top-bar">
    <div>Time left: <span id="timer">30:00</span></div>
    <div style="display:flex;gap:1.5rem;align-items:center;">
      <div>Violations: <span id="violations">0</span>/6</div>
      <button class="neon" onclick="manualSubmit()" style="padding:10px 24px;border-radius:20px;">Submit Exam</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="main-area">
    <iframe id="form-iframe" allowfullscreen></iframe>
  </div>

  <div class="side-panel">
    <div class="glass monitor" style="padding:0;">
      <video id="webcam" autoplay playsinline muted style="width:100%; height:auto; display:block;"></video>
      <canvas id="face-overlay" width="360" height="270" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas>
    </div>
    <div class="glass status-bar" id="gaze-status" style="padding:16px;font-size:1.05rem;text-align:center;">
      Gaze: Center • Head: Stable
    </div>
    <div class="glass log">
      <div id="log-content"></div>
    </div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen" class="screen">
  <div class="glass result-box">
    <h2 style="color:var(--success);margin-bottom:1.8rem;text-align:center;">Examination Finished</h2>
    <div id="result-details" style="font-size:1.18rem;line-height:1.8;text-align:center;"></div>
    <button class="neon" style="margin:2.5rem auto 0;display:block;padding:16px 90px;border-radius:20px;" onclick="location.reload()">
      Return to Start
    </button>
  </div>
</div>

<footer>
  <p style="font-size:0.95rem;opacity:0.9;">
    Developed by<br>
    <strong>PAVAN S POOJARY</strong>
  </p>
</footer>

<script>
// ────────────────────────────────────────────────
//  LOCAL STORAGE FOR PERSISTENT TESTS
// ────────────────────────────────────────────────
function loadTests() {
  const saved = localStorage.getItem("examlock_tests");
  if (saved) return JSON.parse(saved);

  // Default tests (only first time)
  return [
    {id:"c1", name:"C SET 1", url:"https://forms.gle/TGmx7fRmLXAAmxJw9"},
    {id:"c2", name:"C SET 2", url:"https://forms.gle/JoRWxNeU5rLgMCpj7"},
    {id:"c3", name:"C SET 3", url:"https://forms.gle/xMRg8z3pRh4hbcxZA"},
    {id:"py1",name:"PYTHON SET 1", url:"https://forms.gle/SdAx4pXXXGxoqtRi8"},
    {id:"py2",name:"PYTHON SET 2", url:"https://forms.gle/4cuF6Z5vGWpmfsTJA"},
    {id:"py3",name:"PYTHON SET 3", url:"https://forms.gle/FdiW5KQBpfsgBNyEA"},
    {id:"java",name:"JAVA SET", url:"https://forms.gle/cxm8gjXCgaqfKcc3A"}
  ];
}

function saveTests() {
  localStorage.setItem("examlock_tests", JSON.stringify(tests));
}

let tests = loadTests();

// ────────────────────────────────────────────────
let currentStudent = "";
let currentTest = null;
let violations = 0;
let timeLeft = 1800;
let timer = null;
let faceLandmarker = null;
let stream = null;
let audioCtx = null;
let analyser = null;
let micStream = null;

// ────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startStudent() {
  const name = document.getElementById("student-name").value.trim();
  if (!name) return alert("Please enter your full name");
  currentStudent = name;
  document.getElementById("student-display-name").textContent = name;
  showScreen("student-dashboard");
  renderTests();
}

function loginAdmin() {
  const u = document.getElementById("admin-user").value.trim();
  const p = document.getElementById("admin-pass").value;
  if (u === "admin" && p === "admin123") {
    showScreen("admin-dashboard");
    renderAdmin();
  } else {
    alert("Invalid admin credentials");
  }
}

function renderTests() {
  const grid = document.getElementById("test-grid");
  grid.innerHTML = "";
  tests.forEach(t => {
    const card = document.createElement("div");
    card.className = "glass-card test-card";
    card.innerHTML = `<h3>${t.name}</h3><button class="neon" onclick="startExam('${t.id}')">Start Exam</button>`;
    grid.appendChild(card);
  });
}

function renderAdmin() {
  const grid = document.getElementById("admin-tests");
  grid.innerHTML = "";
  tests.forEach((t,i) => {
    const card = document.createElement("div");
    card.className = "glass-card test-card";
    card.innerHTML = `
      <h3>${t.name}</h3>
      <small style="opacity:0.8; word-break:break-all; display:block; margin:0.6rem 0;">${t.url}</small>
      <button class="danger remove-btn" onclick="deleteTest(${i})">Remove</button>
    `;
    grid.appendChild(card);
  });
}

function addTest() {
  const name = document.getElementById("new-name").value.trim();
  const url  = document.getElementById("new-url").value.trim();
  if (!name || !url) return alert("Both fields are required");
  tests.push({id:Date.now().toString(), name, url});
  saveTests();
  renderAdmin();
  renderTests();
}

function deleteTest(i) {
  if (confirm("Delete this test permanently?")) {
    tests.splice(i, 1);
    saveTests();
    renderAdmin();
    renderTests();
  }
}

// ────────────────────────────────────────────────
async function startExam(id) {
  currentTest = tests.find(t => t.id === id);
  document.getElementById("form-iframe").src = currentTest.url;

  violations = 0;
  timeLeft = 1800;
  document.getElementById("violations").textContent = "0";

  showScreen("exam-screen");
  document.documentElement.requestFullscreen().catch(()=>{});

  startTimer();
  await startProctoring();
}

function startTimer() {
  timer = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60).toString().padStart(2,'0');
    const s = (timeLeft % 60).toString().padStart(2,'0');
    document.getElementById("timer").textContent = `${m}:${s}`;
    if (timeLeft <= 0) finishExam("Time expired");
  }, 1000);
}

async function startProctoring() {
  // Fullscreen lock
  setInterval(() => {
    if (!document.fullscreenElement) finishExam("Fullscreen exited");
  }, 600);

  // Tab switch → instant terminate
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      finishExam("Tab switch detected");
    }
  });

  // Block copy/paste/cut/right-click
  ["copy","cut","paste","contextmenu"].forEach(ev => {
    document.addEventListener(ev, e => {
      e.preventDefault();
      logEvent(ev + " attempt blocked");
    });
  });

  // Camera + gaze tracking
  try {
    stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
    document.getElementById("webcam").srcObject = stream;

    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numFaces: 1
    });

    detectGaze();
  } catch (e) {
    logEvent("Camera access denied", true);
  }

  // Voice detection
  try {
    micStream = await navigator.mediaDevices.getUserMedia({audio: true});
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaStreamSource(micStream);
    source.connect(analyser);
    analyser.fftSize = 512;

    setInterval(() => {
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a,b)=>a+b) / data.length;
      if (avg > 45) {
        violations++;
        logEvent("Speaking / noise detected", true);
        playAlertSound();
        document.getElementById("violations").textContent = violations;
        if (violations >= 6) finishExam("Voice violation");
      }
    }, 600);
  } catch (e) {
    logEvent("Microphone access denied", true);
  }
}

async function detectGaze() {
  if (!faceLandmarker) return requestAnimationFrame(detectGaze);

  const video = document.getElementById("webcam");
  if (video.readyState < 2) return requestAnimationFrame(detectGaze);

  const result = await faceLandmarker.detectForVideo(video, performance.now());
  const canvas = document.getElementById("face-overlay");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (result.faceLandmarks.length === 0) {
    logEvent("No face detected", true);
    violations++;
    playAlertSound();
  } else {
    const landmarks = result.faceLandmarks[0];
    // Iris-based gaze estimation
    const leftIris = landmarks[473];
    const rightIris = landmarks[468];
    const irisX = (leftIris.x + rightIris.x) / 2;
    const irisY = (leftIris.y + rightIris.y) / 2;

    const deviationX = irisX - 0.5;
    const deviationY = irisY - 0.5;

    let gaze = "Center";
    if (Math.abs(deviationX) > 0.12) gaze = deviationX > 0 ? "Right" : "Left";
    if (Math.abs(deviationY) > 0.12) gaze = deviationY > 0 ? "Down" : "Up";

    document.getElementById("gaze-status").textContent = `Gaze: ${gaze} • Head stable`;

    if (Math.abs(deviationX) > 0.18 || Math.abs(deviationY) > 0.18) {
      logEvent("Looking away from screen", true);
      violations++;
      playAlertSound();
    }
  }

  document.getElementById("violations").textContent = violations;
  if (violations >= 6) finishExam("Too many violations");

  requestAnimationFrame(detectGaze);
}

function playAlertSound() {
  const audio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-alert-digital-alarm-766.mp3");
  audio.volume = 0.4;
  audio.play().catch(() => {});
}

// ────────────────────────────────────────────────
function logEvent(msg) {
  const div = document.createElement("div");
  div.className = "log-item";
  div.innerHTML = `<span style="color:#ff3366">[${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}]</span> ${msg}`;
  document.getElementById("log-content").prepend(div);
}

function manualSubmit() {
  if (confirm("Are you sure you want to submit the exam?")) finishExam("Manual submit");
}

function finishExam(reason) {
  clearInterval(timer);
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (micStream) micStream.getTracks().forEach(t => t.stop());

  const used = 1800 - timeLeft;
  const min = Math.floor(used / 60);
  const sec = used % 60;

  document.getElementById("result-details").innerHTML = `
    <b style="color:var(--neon-cyan);">Student:</b> ${currentStudent}<br>
    <b style="color:var(--neon-cyan);">Test:</b> ${currentTest ? currentTest.name : 'Unknown'}<br>
    <b style="color:var(--success);">Time taken:</b> ${min}m ${sec}s<br>
    <b style="color:var(--danger);">Violations:</b> ${violations}<br>
    <b style="color:var(--neon-purple);">Ended because:</b> ${reason}
  `;
  showScreen("result-screen");
  if (document.fullscreenElement) document.exitFullscreen();
}

function logout() {
  if (confirm("Logout? Any ongoing exam will be terminated.")) {
    showScreen("login-screen");
    if (document.fullscreenElement) document.exitFullscreen();
  }
}

// ────────────────────────────────────────────────
showScreen("login-screen");
</script>
</body>
</html>
